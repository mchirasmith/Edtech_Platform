name: CI — PathShala EdTech

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend CI ─────────────────────────────────────────────
  backend-ci:
    name: Backend (Python / FastAPI)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Lint with Ruff
        run: ruff check backend/app/ backend/tests/

      - name: Run tests
        run: pytest backend/tests/ -v
        env:
          # Provide dummy env vars so Settings() can be instantiated during tests
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          CLERK_SECRET_KEY: "sk_test_dummy"
          CLERK_DOMAIN: "dummy.clerk.accounts.dev"
          CLERK_WEBHOOK_SECRET: "whsec_dummy"
          RAZORPAY_KEY_ID: "rzp_test_dummy"
          RAZORPAY_KEY_SECRET: "dummy_secret"
          IMAGEKIT_PRIVATE_KEY: "private_dummy"
          IMAGEKIT_PUBLIC_KEY: "public_dummy"
          IMAGEKIT_URL_ENDPOINT: "https://ik.imagekit.io/dummy"
          SUPABASE_URL: "https://dummy.supabase.co"
          SUPABASE_SERVICE_ROLE_KEY: "eyJ_dummy"
          RESEND_API_KEY: "re_dummy"

  # ── Frontend CI ────────────────────────────────────────────
  frontend-ci:
    name: Frontend (React / Vite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: "http://localhost:8000"
          VITE_CLERK_PUBLISHABLE_KEY: "pk_test_dummy_key_for_build"
          VITE_RAZORPAY_KEY_ID: "rzp_test_dummy"
          VITE_IMAGEKIT_PUBLIC_KEY: "public_dummy"
          VITE_IMAGEKIT_URL_ENDPOINT: "https://ik.imagekit.io/dummy"
